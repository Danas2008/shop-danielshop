{% extends "base.html" %}
{% load i18n %}
{% block title %}{% trans "Contact" %} — DanielsPrints{% endblock %}
{% block content %}
<div class="container section" style="max-width:600px;">
  <h2>{% trans "Contact Us" %}</h2>
  <form method="post">
    {% csrf_token %}
    <div class="form-group"><label for="name">{% trans "Name" %}</label><input type="text" id="name" name="name" required></div>
    <div class="form-group"><label for="email">{% trans "Email" %}</label><input type="email" id="email" name="email" required></div>
    <div class="form-group"><label for="message">{% trans "Message" %}</label><textarea id="message" name="message" rows="5" required></textarea></div>
    <button type="submit" class="btn btn-primary magnetic">{% trans "Send" %}</button>
  </form>
</div>
{% endblock %}
