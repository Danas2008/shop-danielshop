server {
    listen 80;
    server_name shop.danielhavlicek.cz;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name shop.danielhavlicek.cz;

    ssl_certificate     /etc/letsencrypt/live/danielhavlicek.cz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/danielhavlicek.cz/privkey.pem;

    client_max_body_size 20M;

    location /static/ {
        alias /var/www/shop/staticfiles/;
    }

    location /media/ {
        alias /var/www/shop/media/;
    }

    location / {
        proxy_pass http://127.0.0.1:8005;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
